name: 72-hour Reviewed Stories Intake

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 */3 * *'

jobs:
  fetch-stories:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run story intake
        run: npm run fetch-stories

      - name: Commit updated queue files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/data/queue.json public/review-queue.json
          git diff --cached --quiet || git commit -m "Update review queue"
          git push
